<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Study Hub</title>
<style>
body{
background:#000;
color:#00ff99;
font-family:"Courier New", monospace;
margin:0;
padding:30px;
background-image:radial-gradient(#111 1px, transparent 1px);
background-size:20px 20px;
}
.container{
max-width:1100px;
margin:auto;
border:4px double #00ff99;
padding:30px;
background:#050505;
box-shadow:0 0 25px #00ff99;
}
h1{
text-align:center;
font-size:42px;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
}
.subtitle{
text-align:center;
color:#ff66cc;
margin-bottom:35px;
}
.list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.item{
border:2px solid #00ff99;
padding:20px;
background:#111;
transition:0.25s;
}
.item:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #00ffff;
}
.item a{
text-decoration:none;
color:#ffff66;
font-size:18px;
font-weight:bold;
}
footer{
margin-top:40px;
text-align:center;
color:#777;
}
</style>
</head>
